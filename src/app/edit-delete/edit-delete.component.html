<ion-header>
  <ion-toolbar>
    <ion-title>Manage Items</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon name="help-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar 
    placeholder="Search name to edit..." 
    [(ngModel)]="searchQuery" 
    (ionInput)="onSearch()"
    debounce="500">
  </ion-searchbar>

  <ion-progress-bar *ngIf="showLoading" type="indeterminate"></ion-progress-bar>

  <ion-card *ngFor="let product of displayList">
    <ion-card-header>
      <ion-card-subtitle>{{ product.category }}</ion-card-subtitle>
      <ion-card-title>{{ product.item_name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>Price: <b>${{ product.price }}</b> | Qty: <b>{{ product.quantity }}</b></p>
      <div class="action-buttons ion-margin-top">
        <ion-button fill="outline" size="small" (click)="openEdit(product)">
          <ion-icon name="create-outline" slot="start"></ion-icon>
          Edit
        </ion-button>
        <ion-button fill="outline" color="danger" size="small" (click)="confirmDelete(product)">
          <ion-icon name="trash-outline" slot="start"></ion-icon>
          Delete
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <div *ngIf="displayList.length === 0 && !showLoading" class="ion-text-center ion-padding">
    <p>No items found.</p>
  </div>
</ion-content>

<ion-modal [isOpen]="showEditModal" (didDismiss)="closeEdit()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Edit Item</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeEdit()">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-list>
        <ion-item>
          <ion-label position="stacked">Price ($)</ion-label>
          <ion-input [(ngModel)]="editingItem.price" type="number"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Quantity</ion-label>
          <ion-input [(ngModel)]="editingItem.quantity" type="number"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Category</ion-label>
          <ion-select [(ngModel)]="editingItem.category">
            <ion-select-option *ngFor="let opt of categoryOptions" [value]="opt.value">{{opt.label}}</ion-select-option>
          </ion-select>
        </ion-item>
      </ion-list>
      <ion-button expand="block" (click)="saveEdit()" [disabled]="isSaving" class="ion-margin-top">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Save Changes
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>

<ion-alert
  [isOpen]="showDeleteAlert"
  header="Confirm Delete"
  message="Are you sure you want to delete this item?"
  [buttons]="deleteAlertButtons">
</ion-alert>

<ion-header>
  <ion-toolbar>
    <ion-title>ArtGalley Stock</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="loadData()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="showPageHelp()">
        <ion-icon name="help-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar 
    placeholder="Search name..." 
    [(ngModel)]="searchQuery" 
    (ionInput)="onSearch()"
    debounce="500">
  </ion-searchbar>

  <ion-progress-bar *ngIf="showLoading" type="indeterminate"></ion-progress-bar>

  <ion-card *ngFor="let product of displayList">
    <ion-card-header>
      <ion-card-subtitle>{{ product.category }}</ion-card-subtitle>
      <ion-card-title>{{ product.item_name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>Price: <b>${{ product.price }}</b> | Qty: <b>{{ product.quantity }}</b></p>
      <div class="ion-margin-top">
        <ion-badge [color]="product.stock_status === 'In stock' ? 'success' : 'danger'">
          {{ product.stock_status }}
        </ion-badge>
        <ion-chip *ngIf="product.featured_item === 1" color="warning">
          <ion-icon name="star"></ion-icon>
          <ion-label>Featured</ion-label>
        </ion-chip>
      </div>
    </ion-card-content>
  </ion-card>

  <div *ngIf="displayList.length === 0 && !showLoading" class="ion-text-center ion-padding">
    <ion-icon name="archive-outline" size="large" color="medium"></ion-icon>
    <p>No inventory found.</p>
  </div>
</ion-content>
